name: Update Template CI
on:
  workflow_dispatch:
# Schedule intentionally removed — we manage Upptime upgrades manually
# so that workflow-level GitHub App auth edits are not overwritten.
# Run this workflow via the Actions UI when you want to pull in an Upptime upgrade.
jobs:
  release:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Update template
        uses: upptime/uptime-monitor@master
        with:
          command: "update-template"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
